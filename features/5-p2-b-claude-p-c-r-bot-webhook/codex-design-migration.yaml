verdict: fail
blocking: 1
persona: migration
summary: |
  後方互換の入口として既存の `ClaudeWatchClient` コンストラクタ利用が破壊される可能性が明示的に扱われていません。その他は移行上の注意点はあるものの、Issue の決定済みスコープ内の設計変更として扱える範囲です。
findings:
  - severity: high
    title: "既存の ClaudeWatchClient コンストラクタ呼び出しを破壊する"
    detail: |
      `ClaudeWatchClient.__init__` を `target_channel_id: int` から `channel_map: dict[int, str]` へ変更すると、既存テストや外部の直接利用で `ClaudeWatchClient(target_channel_id=...)` または位置引数で初期化している呼び出し元が即座に `TypeError` になります。env fallback は `build_client()` 経由の互換性だけで、public に見える既存クラス初期化 API の移行パスがありません。
    suggestion: |
      少なくとも1リリース分は `target_channel_id: int | None = None` を受ける互換 shim を残し、指定時は `{target_channel_id: cwd_or_env_dir}` に変換する。既存コンストラクタ呼び出しの互換テストも追加してください。
    file: "claude_watch/bot.py"
    line: 110
  - severity: medium
    title: "bot の既定動作が new から continue に変わる移行影響がテストされない"
    detail: |
      `DISCORD_CHANNEL_ID` の env fallback は残す一方で、そのチャンネルへの着弾は従来の `run_claude(prompt)` ではなく `mode="continue"` になります。Issue の目的には沿っていますが、既存運用では同じ env 設定のまま応答の文脈共有が始まるため、移行時の振る舞い変更として明示テストと README の注意が必要です。
    suggestion: |
      `DISCORD_CHANNEL_ID` fallback 経由でも `mode="continue"` と `cwd` が使われることをテストし、README に既存 env 利用者は Phase 1 の毎回新セッション動作ではなくなると明記してください。
    file: "claude_watch/bot.py"
    line: 123
  - severity: medium
    title: "debug mode が mode/session_id バリデーションを迂回する"
    detail: |
      after スニペットでは `CLAUDE_WATCH_DEBUG=1` の場合に `_build_argv()` より前で return するため、`mode="resume"` かつ `session_id=None` や未知の `mode` が `ValueError` になりません。通常実行と debug 実行で API 契約が変わり、既存テスト環境に debug env が残っていると T04/T05 の期待値とも衝突します。
    suggestion: |
      debug return の前に `_build_argv(prompt, mode, session_id)` を呼んで入力検証だけは常に実行してください。
    file: "claude_watch/claude_runner.py"
    line: 82
